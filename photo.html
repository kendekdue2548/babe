<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💭 คนที่คิดถึง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;700;900&family=Mitr:wght@400;500;600&family=Sarabun:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;cursor:none;user-select:none;font-family:'Sarabun',sans-serif}
#cd{position:fixed;z-index:9999;pointer-events:none;width:10px;height:10px;border-radius:50%;background:#e84393;transform:translate(-50%,-50%);mix-blend-mode:multiply}
#cr{position:fixed;z-index:9998;pointer-events:none;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(232,67,147,.38);transform:translate(-50%,-50%);transition:left .07s,top .07s}
#veil{position:fixed;inset:0;z-index:9000;background:linear-gradient(145deg,#fff0f8,#fce4ec);display:flex;align-items:center;justify-content:center;transition:opacity 1s,visibility 1s}
#veil.gone{opacity:0;visibility:hidden;pointer-events:none}
.vh{font-size:3rem;animation:vp .9s ease-in-out infinite}
@keyframes vp{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
#bgc{position:fixed;inset:0;z-index:0}
.grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(232,67,147,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(232,67,147,.02) 1px,transparent 1px);background-size:48px 48px}
#rain{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.rh{position:absolute;top:-40px;animation:fall linear infinite;opacity:0}
@keyframes fall{0%{transform:translateY(0)rotate(0)scale(var(--s));opacity:0}7%{opacity:var(--o)}90%{opacity:var(--o)}100%{transform:translateY(112vh)rotate(var(--r))scale(var(--s));opacity:0}}
#stars{position:fixed;inset:0;z-index:3;pointer-events:none}
.ss{position:absolute;animation:tw var(--d) ease-in-out infinite var(--dl)}
@keyframes tw{0%,100%{opacity:.04;transform:scale(.7)}50%{opacity:.3;transform:scale(1.15)}}
.deco{position:fixed;pointer-events:none;z-index:5;font-size:var(--fs,1.6rem);opacity:.6;animation:df var(--d) ease-in-out infinite var(--dl)}
@keyframes df{0%,100%{transform:translateY(0)rotate(0)}50%{transform:translateY(-10px)rotate(7deg)}}
.nav-arr{position:fixed;top:50%;transform:translateY(-50%);z-index:20;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.45);backdrop-filter:blur(14px);border:1px solid rgba(251,182,206,.45);color:rgba(200,80,160,.6);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s}
.nav-arr:hover{background:rgba(255,255,255,.85);color:#e84393;transform:translateY(-50%) scale(1.08)}
.nav-arr.left{left:18px}.nav-arr.right{right:18px}
.page{position:fixed;inset:0;z-index:10;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 6vw;gap:4vw;opacity:0;animation:sceneIn .8s .3s both}
@keyframes sceneIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.left{display:flex;flex-direction:column;gap:0;padding-left:2vw}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.55);backdrop-filter:blur(14px);border:1px solid rgba(251,182,206,.5);border-radius:50px;padding:6px 18px;width:fit-content;font-size:.7rem;color:rgba(160,50,120,.6);letter-spacing:.12em;text-transform:uppercase;margin-bottom:clamp(16px,2.8vh,24px);opacity:0;animation:fadeUp .6s .5s both}
.big-title{font-family:'Mitr',sans-serif;font-weight:500;font-size:clamp(2.8rem,5.5vw,5rem);line-height:1.05;letter-spacing:.01em;background:linear-gradient(125deg,#e84393,#d946ef,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;opacity:0;animation:fadeUp .7s .65s both}
.title-sub{font-family:'Sarabun',sans-serif;font-style:italic;font-weight:300;font-size:clamp(.88rem,1.2vw,1rem);color:rgba(180,80,150,.5);letter-spacing:.08em;display:flex;align-items:center;gap:10px;margin-bottom:clamp(20px,3.5vh,30px);opacity:0;animation:fadeUp .6s .8s both}
.tl{width:38px;height:1px;background:linear-gradient(90deg,rgba(232,67,147,.3),transparent)}.tl.r{background:linear-gradient(90deg,transparent,rgba(232,67,147,.3))}
.stats{display:flex;flex-direction:column;gap:10px;margin-bottom:clamp(20px,3.5vh,30px);opacity:0;animation:fadeUp .6s .95s both}
.stat-row{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.5);backdrop-filter:blur(16px);border:1px solid rgba(255,210,235,.55);border-radius:16px;padding:13px 18px;transition:transform .22s,box-shadow .22s}
.stat-row:hover{transform:translateX(6px);box-shadow:0 10px 30px rgba(232,67,147,.09)}
.stat-icon{font-size:1.4rem;width:36px;text-align:center;flex-shrink:0}
.stat-text{font-size:clamp(.82rem,1.05vw,.94rem);font-weight:300;color:rgba(80,20,60,.65);line-height:1.4}
.stat-text b{font-weight:700;background:linear-gradient(125deg,#e84393,#d946ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cta-row{opacity:0;animation:fadeUp .6s 1.15s both}
.btn-next{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#ff5db0,#e8189a);color:#fff;border:none;border-radius:50px;padding:14px 34px;font-family:'Kanit',sans-serif;font-weight:700;font-size:.92rem;letter-spacing:.06em;cursor:pointer;box-shadow:0 6px 28px rgba(232,24,154,.38);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.btn-next::after{content:'';position:absolute;top:0;left:-90%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .5s}
.btn-next:hover::after{left:140%}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(232,24,154,.45)}
.right{display:flex;justify-content:center;align-items:center;position:relative;opacity:0;animation:fadeUp .8s .4s both}
.photo-wrap{position:relative;width:min(360px,38vw)}
.ring1{position:absolute;inset:-16px;border-radius:36px;border:1.5px dashed rgba(251,182,206,.5);animation:spinR 20s linear infinite}
.ring2{position:absolute;inset:-30px;border-radius:44px;border:1px solid rgba(200,130,255,.18);animation:spinR 30s linear infinite reverse}
@keyframes spinR{to{transform:rotate(360deg)}}
.photo-glow{position:absolute;inset:-20px;border-radius:40px;background:radial-gradient(ellipse,rgba(232,67,147,.18),rgba(192,132,252,.1),transparent 70%);filter:blur(24px);animation:gp 3.5s ease-in-out infinite}
@keyframes gp{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.photo-frame{width:100%;padding-top:118%;border-radius:36px;position:relative;overflow:hidden;box-shadow:0 0 0 4px rgba(255,255,255,.85),0 0 0 7px rgba(255,182,210,.35),0 28px 80px rgba(232,67,147,.22),0 8px 24px rgba(232,67,147,.12);animation:frameFloat 5s ease-in-out infinite;cursor:crosshair}
@keyframes frameFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#realPhoto{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:34px;display:block}
#scratchCanvas{position:absolute;inset:0;border-radius:34px;touch-action:none}
.scratch-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.75);backdrop-filter:blur(12px);border:1px solid rgba(255,210,235,.7);border-radius:50px;padding:8px 20px;white-space:nowrap;z-index:10;font-size:.78rem;color:rgba(140,50,110,.7);display:flex;align-items:center;gap:7px;animation:hintPulse 2s ease-in-out infinite;pointer-events:none}
@keyframes hintPulse{0%,100%{opacity:1;transform:translateX(-50%) translateY(0)}50%{opacity:.6;transform:translateX(-50%) translateY(-3px)}}
.hint-hand{font-size:1.1rem;animation:handWiggle 1s ease-in-out infinite}
@keyframes handWiggle{0%,100%{transform:rotate(0)}50%{transform:rotate(20deg)}}
.sticker{position:absolute;font-size:var(--fs,1.6rem);pointer-events:none;z-index:6;animation:stkFloat var(--d) ease-in-out infinite var(--dl);filter:drop-shadow(0 3px 8px rgba(0,0,0,.08))}
@keyframes stkFloat{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}50%{transform:translateY(-8px) rotate(calc(var(--rot,0deg) + 6deg))}}
.caption-badge{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.75);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.95);border-radius:50px;padding:10px 22px;white-space:nowrap;box-shadow:0 8px 28px rgba(232,67,147,.12);font-size:.85rem;color:rgba(80,20,60,.7);display:flex;align-items:center;gap:8px;animation:badgeFloat 4.5s ease-in-out infinite}
@keyframes badgeFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.badge-heart{animation:bh 1.5s ease-in-out infinite;font-size:1rem}
@keyframes bh{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.15)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:800px){.page{grid-template-columns:1fr;padding:70px 7vw 110px;overflow-y:auto}html,body{overflow:auto}.right{order:-1}.photo-wrap{width:min(280px,75vw)}.big-title{font-size:clamp(2.4rem,11vw,4rem)}}
</style>
</head>
<body>
<div id="cd"></div><div id="cr"></div>
<div id="veil"><div class="vh">💗</div></div>
<canvas id="bgc"></canvas>
<div class="grid"></div>
<div id="rain"></div>
<div id="stars"></div>
<span class="deco" style="top:4%;left:3%;--d:4.2s;--dl:0s">🌸</span>
<span class="deco" style="top:6%;right:4%;--d:5.5s;--dl:.7s;--fs:1.3rem">💮</span>
<span class="deco" style="bottom:10%;left:3%;--d:6s;--dl:1.3s">🌷</span>
<span class="deco" style="bottom:8%;right:3.5%;--d:4.8s;--dl:.3s;--fs:1.4rem">✨</span>
<button class="nav-arr left" onclick="goBack()">‹</button>
<button class="nav-arr right" onclick="goNext()">›</button>
<div class="page">
  <div class="left">
    <div class="eyebrow">💭 &nbsp; คนที่คิดถึง</div>
    <div class="big-title">คนนี้<br>แหละ...</div>
    <div class="title-sub"><span class="tl"></span>ที่ทำให้ใจเต้นแรงทุกครั้ง<span class="tl r"></span></div>
    <div class="stats">
      <div class="stat-row"><div class="stat-icon">🦋</div><div class="stat-text">ทุกครั้งที่เห็นหน้า<b>ผีเสื้อบินในท้อง</b>ทันที</div></div>
      <div class="stat-row"><div class="stat-icon">💭</div><div class="stat-text">คิดถึงอยู่<b>ตลอดเวลา</b> ไม่ว่าจะทำอะไรก็ตาม</div></div>
      <div class="stat-row"><div class="stat-icon">🌙</div><div class="stat-text">ก่อนนอนทุกคืน<b>ชื่อเธอ</b>ผ่านหัวเสมอ</div></div>
      <div class="stat-row"><div class="stat-icon">💗</div><div class="stat-text">รู้สึกว่า<b>โชคดีมาก</b>ที่ได้รู้จักเธอ</div></div>
    </div>
    <div class="cta-row"><button class="btn-next" onclick="goNext()">บอกเธอเลย 💝</button></div>
  </div>
  <div class="right">
    <div class="photo-wrap">
      <div class="photo-glow"></div>
      <div class="ring2"></div>
      <div class="ring1"></div>
      <span class="sticker" style="top:-8%;left:-12%;--d:4s;--dl:0s;--rot:-12deg;--fs:1.8rem">🌸</span>
      <span class="sticker" style="top:5%;right:-14%;--d:5s;--dl:.6s;--rot:8deg;--fs:1.4rem">✨</span>
      <span class="sticker" style="bottom:12%;left:-14%;--d:6s;--dl:1.2s;--rot:-8deg;--fs:1.5rem">💕</span>
      <span class="sticker" style="bottom:5%;right:-10%;--d:4.5s;--dl:.4s;--rot:14deg;--fs:1.3rem">🌷</span>
      <span class="sticker" style="top:42%;left:-16%;--d:7s;--dl:1.8s;--rot:-6deg;--fs:1rem">⭐</span>
      <div class="photo-frame" id="photoFrame">

function drawBg(){cx.clearRect(0,0,cv.width,cv.height);const bg=cx.createLinearGradient(0,0,cv.width,cv.height);bg.addColorStop(0,'#fff2fa');bg.addColorStop(.35,'#fde8f4');bg.addColorStop(.65,'#f8e0fb');bg.addColorStop(1,'#fff0f8');cx.fillStyle=bg;cx.fillRect(0,0,cv.width,cv.height);orbs.forEach(o=>{o.a+=o.s;const ox=(o.x+Math.sin(o.a)*.07)*cv.width;const oy=(o.y+Math.cos(o.a*.65)*.09)*cv.height;const r=o.r*Math.max(cv.width,cv.height);const g=cx.createRadialGradient(ox,oy,0,ox,oy,r);g.addColorStop(0,o.c);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.beginPath();cx.arc(ox,oy,r,0,Math.PI*2);cx.fill()});requestAnimationFrame(drawBg)}drawBg();
const rEl=document.getElementById('rain');const pks=['#f9a8d4','#f472b6','#ec4899','#fda4af','#f0abfc','#fbcfe8'];

function spawnH(){const h=document.createElement('div');h.className='rh';const sz=9+Math.random()*14;h.appendChild(mkH(sz,pks[Math.floor(Math.random()*pks.length)]));h.style.left=Math.random()*100+'%';h.style.setProperty('--o',.12+Math.random()*.35);h.style.setProperty('--s',.5+Math.random()*.85);h.style.setProperty('--r',(160+Math.random()*380)+'deg');const d=5+Math.random()*9;h.style.animationDuration=d+'s';h.style.animationDelay=Math.random()*.5+'s';rEl.appendChild(h);setTimeout(()=>h.remove(),(d+2)*1000)}

const stEl=document.getElementById('stars'),sc=['✦','✧','⋆','·','✼'];
for(let i=0;i<50;i++){const s=document.createElement('div');s.className='ss';s.textContent=sc[Math.floor(Math.random()*sc.length)];s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.fontSize=(4+Math.random()*6)+'px';s.style.color=`rgba(200,50,170,${.04+Math.random()*.12})`;s.style.setProperty('--d',(2+Math.random()*5)+'s');s.style.setProperty('--dl',(Math.random()*5)+'s');stEl.appendChild(s)}
/* SCRATCH */
const frame=document.getElementById('photoFrame');
const canvas=document.getElementById('scratchCanvas');
const hint=document.getElementById('scratchHint');
const ctx2=canvas.getContext('2d');
let scratching=false,hintGone=false,strokeCount=0;
const STROKES=55;
function initScratch(){
  const w=frame.offsetWidth,h=frame.offsetHeight;
  canvas.width=w;canvas.height=h;
  const grad=ctx2.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,'#fbb6ce');grad.addColorStop(.4,'#f472b6');
  grad.addColorStop(.7,'#e879f9');grad.addColorStop(1,'#c084fc');
  ctx2.fillStyle=grad;ctx2.fillRect(0,0,w,h);
  ctx2.globalAlpha=.2;ctx2.font='26px serif';
  for(let y=40;y<h;y+=58)for(let x=24;x<w;x+=54){ctx2.fillStyle='#fff';ctx2.fillText(['💕','✦','🌸','⋆'][Math.floor(Math.random()*4)],x,y)}
  ctx2.globalAlpha=1;
  ctx2.fillStyle='rgba(255,255,255,.7)';ctx2.font='bold 14px Sarabun,sans-serif';ctx2.textAlign='center';
  ctx2.fillText('ถูตรงนี้เพื่อดูว่าใคร... 🌸',w/2,h/2-8);
  ctx2.font='22px serif';ctx2.fillText('✋',w/2,h/2+20);
}
function getPos(e){const r=canvas.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top}}
const sparkEmoji=['✨','💕','🌸','⭐'];
function spawnTip(px,py){
  if(Math.random()>.35)return;
  const el=document.createElement('div');
  const dx=((Math.random()-.5)*40)+'px';
  el.style.cssText=`position:fixed;left:${px}px;top:${py}px;pointer-events:none;z-index:9990;font-size:${.7+Math.random()*.6}rem;transform:translate(-50%,-50%);animation:tipSpark .55s ease forwards;--dx:${dx}`;
  el.textContent=sparkEmoji[Math.floor(Math.random()*sparkEmoji.length)];
  document.body.appendChild(el);setTimeout(()=>el.remove(),600);
}
const sk2=document.createElement('style');
sk2.textContent='@keyframes tipSpark{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}100%{opacity:0;transform:translate(calc(-50% + var(--dx,10px)),-80%) scale(1.3)}}';
document.head.appendChild(sk2);
function spawnBurst(){
  const emojis=['💖','✨','🌸','💕','⭐','🎉','💝','🌷'];
  const el=document.createElement('div');
  const rx=(Math.random()-.5)*300,ry=(Math.random()-.5)*300;
  el.style.cssText=`position:fixed;left:${window.innerWidth/2}px;top:${window.innerHeight/2}px;pointer-events:none;z-index:9990;font-size:${1.2+Math.random()*.8}rem;animation:burstOut .9s ease forwards;--rx:${rx}px;--ry:${ry}px`;
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}
const sk3=document.createElement('style');
sk3.textContent='@keyframes burstOut{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}60%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--rx)),calc(-50% + var(--ry))) scale(1.4)}}';
document.head.appendChild(sk3);
function triggerReveal(){
  if(hintGone) return;
  hintGone = true;
  // smooth fade-clear animation
  let alpha = 1.0;
  function clearStep(){
    alpha -= 0.06;
    if(alpha <= 0){
      ctx2.clearRect(0, 0, canvas.width, canvas.height);
      for(let i=0;i<18;i++) setTimeout(()=>spawnBurst(), i*60);
      return;
    }
    ctx2.globalCompositeOperation = 'destination-out';
    ctx2.fillStyle = 'rgba(0,0,0,0.12)';
    ctx2.fillRect(0, 0, canvas.width, canvas.height);
    requestAnimationFrame(clearStep);
  }
  requestAnimationFrame(clearStep);
}
function scratch(x,y){
  ctx2.globalCompositeOperation='destination-out';
  ctx2.beginPath();ctx2.arc(x,y,32,0,Math.PI*2);ctx2.fill();
  spawnTip(canvas.getBoundingClientRect().left+x,canvas.getBoundingClientRect().top+y);
  strokeCount++;if(strokeCount>=STROKES&&!hintGone)triggerReveal();
}
canvas.addEventListener('mousedown',e=>{scratching=true;const p=getPos(e);scratch(p.x,p.y)});
canvas.addEventListener('mousemove',e=>{if(!scratching)return;const p=getPos(e);scratch(p.x,p.y)});
canvas.addEventListener('mouseup',()=>scratching=false);
canvas.addEventListener('mouseleave',()=>scratching=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();scratching=true;const p=getPos(e);scratch(p.x,p.y)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!scratching)return;const p=getPos(e);scratch(p.x,p.y)},{passive:false});
canvas.addEventListener('touchend',()=>scratching=false);
window.addEventListener('load',()=>setTimeout(initScratch,300));
window.addEventListener('resize',initScratch);
function goBack(){document.body.style.transition='opacity .5s';document.body.style.opacity='0';setTimeout(()=>window.location.href='story.html',520)}
function goNext(){document.body.style.transition='opacity .5s';document.body.style.opacity='0';setTimeout(()=>window.location.href='be-my-girlfriend.html',520)}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')goNext();if(e.key==='ArrowLeft')goBack()});
</script>
